services:
  bgp-ls-collector:
    build: .
    container_name: bgp-ls-collector
    restart: unless-stopped

    # NET_BIND_SERVICE allows binding to privileged port 179
    cap_add:
      - NET_BIND_SERVICE

    ports:
      # BGP listener
      - "179:179/tcp"
      # REST API + WebSocket
      - "8080:8080/tcp"

    volumes:
      # Mount a custom config at runtime
      - ./config.yaml:/app/config.yaml:ro

    environment:
      BGPLS_LOG_LEVEL: INFO
      BGPLS_LOG_FORMAT: text
      # Override any config.yaml value via env:
      # BGPLS_LOCAL_AS: "65000"
      # BGPLS_ROUTER_ID: "10.0.0.254"
      # BGPLS_ALLOW_DYNAMIC: "false"

    networks:
      - mgmt

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  mgmt:
    driver: bridge
